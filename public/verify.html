<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Tirth Sutra</title>
  <link rel="preload" as="image" href="Brand_Logo.jpg" />
  <link rel="stylesheet" href="Style.css" />
  <!-- Google tag (gtag.js) -->

  ></script>

      dataLayer.push(arguments);

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f6efe8;
      color: #2f251e;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .card {
      max-width: 460px;
      width: 100%;
      background: #fffaf4;
      border: 1px solid #ead9cb;
      border-radius: 28px;
      box-shadow: 0 18px 42px rgba(74, 46, 42, 0.1);
      padding: 34px 28px;
    }

    .logo {
      width: 84px;
      height: 84px;
      border-radius: 24px;
      object-fit: cover;
      margin-bottom: 18px;
      box-shadow: 0 12px 22px rgba(74, 46, 42, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      color: #4a2e2a;
      font-size: 30px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 14px;
      color: #5d5046;
      line-height: 1.8;
      font-size: 15px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      padding: 14px 24px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #8d4d22, #b85c1c);
      box-shadow: 0 10px 22px rgba(184, 92, 28, 0.24);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="Brand_Logo.jpg" alt="Tirth Sutra" class="logo" />
    <h1>Signup now uses OTP</h1>
    <p>Email-link verification has been retired.</p>
    <p>Open Tirth Sutra, sign up with your email, and enter the 6-digit OTP sent to your inbox.</p>
    <p>Your account is created only after the OTP is verified successfully.</p>
    <a class="btn" href="index.html">Open Tirth Sutra</a>
  </div>
</body>
</html>
